<svg xmlns="http://www.w3.org/2000/svg" width="1000" height="560" viewBox="0 0 1000 560" role="img" aria-labelledby="title desc">
  <title id="title">从摩尔定律到韬定律的竞争范式变化</title>
  <desc id="desc">对比几何缩微与时间缩微两种半导体演进思路</desc>
  <rect width="1000" height="560" fill="#f8fafc"/>
  <text x="50" y="70" fill="#111827" font-family="Arial, 'PingFang SC', 'Microsoft YaHei', sans-serif" font-size="34" font-weight="700">芯片竞争的评价体系正在变化</text>
  <text x="50" y="108" fill="#475569" font-family="Arial, 'PingFang SC', 'Microsoft YaHei', sans-serif" font-size="18">过去更关注空间里的晶体管密度，未来更关注系统里的时间效率。</text>

  <rect x="50" y="154" width="390" height="290" rx="8" fill="#ffffff" stroke="#cbd5e1"/>
  <text x="82" y="202" fill="#991b1b" font-family="Arial, 'PingFang SC', 'Microsoft YaHei', sans-serif" font-size="26" font-weight="700">摩尔定律时代</text>
  <text x="82" y="240" fill="#111827" font-family="Arial, 'PingFang SC', 'Microsoft YaHei', sans-serif" font-size="22" font-weight="700">核心问题：做得更小</text>
  <line x1="82" y1="260" x2="408" y2="260" stroke="#e5e7eb"/>
  <text x="82" y="300" fill="#374151" font-family="Arial, 'PingFang SC', 'Microsoft YaHei', sans-serif" font-size="19">• 几何缩微</text>
  <text x="82" y="334" fill="#374151" font-family="Arial, 'PingFang SC', 'Microsoft YaHei', sans-serif" font-size="19">• 制程节点驱动</text>
  <text x="82" y="368" fill="#374151" font-family="Arial, 'PingFang SC', 'Microsoft YaHei', sans-serif" font-size="19">• 晶体管数量增长</text>
  <text x="82" y="402" fill="#374151" font-family="Arial, 'PingFang SC', 'Microsoft YaHei', sans-serif" font-size="19">• 单点制造能力权重高</text>

  <path d="M472 286 H528" stroke="#111827" stroke-width="4" stroke-linecap="round"/>
  <path d="M515 272 L532 286 L515 300" fill="none" stroke="#111827" stroke-width="4" stroke-linecap="round" stroke-linejoin="round"/>
  <text x="468" y="334" fill="#64748b" font-family="Arial, 'PingFang SC', 'Microsoft YaHei', sans-serif" font-size="18">竞争维度迁移</text>

  <rect x="560" y="154" width="390" height="290" rx="8" fill="#ffffff" stroke="#cbd5e1"/>
  <text x="592" y="202" fill="#0f766e" font-family="Arial, 'PingFang SC', 'Microsoft YaHei', sans-serif" font-size="26" font-weight="700">韬（τ）定律视角</text>
  <text x="592" y="240" fill="#111827" font-family="Arial, 'PingFang SC', 'Microsoft YaHei', sans-serif" font-size="22" font-weight="700">核心问题：跑得更快</text>
  <line x1="592" y1="260" x2="918" y2="260" stroke="#e5e7eb"/>
  <text x="592" y="300" fill="#374151" font-family="Arial, 'PingFang SC', 'Microsoft YaHei', sans-serif" font-size="19">• 时间缩微</text>
  <text x="592" y="334" fill="#374151" font-family="Arial, 'PingFang SC', 'Microsoft YaHei', sans-serif" font-size="19">• 逻辑折叠与路径优化</text>
  <text x="592" y="368" fill="#374151" font-family="Arial, 'PingFang SC', 'Microsoft YaHei', sans-serif" font-size="19">• 信号传播时延降低</text>
  <text x="592" y="402" fill="#374151" font-family="Arial, 'PingFang SC', 'Microsoft YaHei', sans-serif" font-size="19">• 全栈系统协同权重上升</text>

  <rect x="50" y="478" width="900" height="46" rx="6" fill="#111827"/>
  <text x="82" y="508" fill="#ffffff" font-family="Arial, 'PingFang SC', 'Microsoft YaHei', sans-serif" font-size="20" font-weight="700">洞察：先进制程仍然重要，但它不再是芯片性能提升的唯一变量。</text>
</svg>
