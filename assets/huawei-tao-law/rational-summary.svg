<svg xmlns="http://www.w3.org/2000/svg" width="1000" height="560" viewBox="0 0 1000 560" role="img" aria-labelledby="title desc">
  <title id="title">如何理性看待华为韬定律</title>
  <desc id="desc">不要神化，也不要低估，韬定律的重点是新变量和新话语权</desc>
  <rect width="1000" height="560" fill="#f8fafc"/>
  <text x="50" y="70" fill="#111827" font-family="Arial, 'PingFang SC', 'Microsoft YaHei', sans-serif" font-size="34" font-weight="700">如何理性看待韬定律？</text>
  <text x="50" y="108" fill="#475569" font-family="Arial, 'PingFang SC', 'Microsoft YaHei', sans-serif" font-size="18">它不是万能解法，但也不是普通营销词。真正重要的是竞争变量变了。</text>

  <rect x="62" y="165" width="260" height="250" rx="8" fill="#ffffff" stroke="#cbd5e1"/>
  <text x="92" y="215" fill="#991b1b" font-family="Arial, 'PingFang SC', 'Microsoft YaHei', sans-serif" font-size="24" font-weight="700">不要神化</text>
  <text x="92" y="262" fill="#334155" font-family="Arial, 'PingFang SC', 'Microsoft YaHei', sans-serif" font-size="18">不能一夜跨越</text>
  <text x="92" y="296" fill="#334155" font-family="Arial, 'PingFang SC', 'Microsoft YaHei', sans-serif" font-size="18">所有技术鸿沟</text>
  <text x="92" y="350" fill="#64748b" font-family="Arial, 'PingFang SC', 'Microsoft YaHei', sans-serif" font-size="17">先进制程、设备、材料、</text>
  <text x="92" y="380" fill="#64748b" font-family="Arial, 'PingFang SC', 'Microsoft YaHei', sans-serif" font-size="17">EDA 生态仍然要补。</text>

  <rect x="370" y="165" width="260" height="250" rx="8" fill="#111827"/>
  <text x="500" y="225" text-anchor="middle" fill="#ffffff" font-family="Arial, 'PingFang SC', 'Microsoft YaHei', sans-serif" font-size="27" font-weight="700">真正的洞察</text>
  <text x="500" y="280" text-anchor="middle" fill="#e5e7eb" font-family="Arial, 'PingFang SC', 'Microsoft YaHei', sans-serif" font-size="20">芯片竞争</text>
  <text x="500" y="318" text-anchor="middle" fill="#e5e7eb" font-family="Arial, 'PingFang SC', 'Microsoft YaHei', sans-serif" font-size="20">从单点制程能力</text>
  <text x="500" y="356" text-anchor="middle" fill="#ffffff" font-family="Arial, 'PingFang SC', 'Microsoft YaHei', sans-serif" font-size="24" font-weight="700">走向全栈系统能力</text>

  <rect x="678" y="165" width="260" height="250" rx="8" fill="#ffffff" stroke="#cbd5e1"/>
  <text x="708" y="215" fill="#0f766e" font-family="Arial, 'PingFang SC', 'Microsoft YaHei', sans-serif" font-size="24" font-weight="700">不要低估</text>
  <text x="708" y="262" fill="#334155" font-family="Arial, 'PingFang SC', 'Microsoft YaHei', sans-serif" font-size="18">它提供了新变量</text>
  <text x="708" y="296" fill="#334155" font-family="Arial, 'PingFang SC', 'Microsoft YaHei', sans-serif" font-size="18">也争夺新话语权</text>
  <text x="708" y="350" fill="#64748b" font-family="Arial, 'PingFang SC', 'Microsoft YaHei', sans-serif" font-size="17">从产品叙事，走向</text>
  <text x="708" y="380" fill="#64748b" font-family="Arial, 'PingFang SC', 'Microsoft YaHei', sans-serif" font-size="17">理论叙事和路线叙事。</text>

  <rect x="62" y="465" width="876" height="46" rx="6" fill="#0f766e"/>
  <text x="500" y="495" text-anchor="middle" fill="#ffffff" font-family="Arial, 'PingFang SC', 'Microsoft YaHei', sans-serif" font-size="20" font-weight="700">结论：追赶旧答案之外，中国芯片也要开始提出新问题。</text>
</svg>
