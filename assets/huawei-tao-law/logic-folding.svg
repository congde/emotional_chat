<svg xmlns="http://www.w3.org/2000/svg" width="1000" height="560" viewBox="0 0 1000 560" role="img" aria-labelledby="title desc">
  <title id="title">逻辑折叠的直观解释</title>
  <desc id="desc">逻辑折叠通过结构创新缩短关键路径、降低信号传播时间</desc>
  <rect width="1000" height="560" fill="#f8fafc"/>
  <text x="50" y="70" fill="#111827" font-family="Arial, 'PingFang SC', 'Microsoft YaHei', sans-serif" font-size="34" font-weight="700">逻辑折叠：用结构创新对冲制程约束</text>
  <text x="50" y="108" fill="#475569" font-family="Arial, 'PingFang SC', 'Microsoft YaHei', sans-serif" font-size="18">它关心的不是“概念好不好听”，而是关键路径能不能变短、信号成本能不能下降。</text>

  <rect x="60" y="160" width="395" height="300" rx="8" fill="#ffffff" stroke="#cbd5e1"/>
  <text x="92" y="208" fill="#991b1b" font-family="Arial, 'PingFang SC', 'Microsoft YaHei', sans-serif" font-size="24" font-weight="700">传统平面布局</text>
  <rect x="110" y="255" width="52" height="52" rx="6" fill="#fee2e2" stroke="#ef4444"/>
  <rect x="275" y="255" width="52" height="52" rx="6" fill="#fee2e2" stroke="#ef4444"/>
  <rect x="275" y="365" width="52" height="52" rx="6" fill="#fee2e2" stroke="#ef4444"/>
  <path d="M162 281 H240 C262 281 275 292 275 307 V365" fill="none" stroke="#ef4444" stroke-width="5" stroke-linecap="round"/>
  <path d="M327 391 H380" fill="none" stroke="#ef4444" stroke-width="5" stroke-linecap="round"/>
  <text x="92" y="485" fill="#475569" font-family="Arial, 'PingFang SC', 'Microsoft YaHei', sans-serif" font-size="18">信号路径更长，绕路更多，时间成本更高。</text>

  <path d="M486 305 H535" stroke="#111827" stroke-width="4" stroke-linecap="round"/>
  <path d="M522 291 L539 305 L522 319" fill="none" stroke="#111827" stroke-width="4" stroke-linecap="round" stroke-linejoin="round"/>

  <rect x="545" y="160" width="395" height="300" rx="8" fill="#ffffff" stroke="#cbd5e1"/>
  <text x="577" y="208" fill="#0f766e" font-family="Arial, 'PingFang SC', 'Microsoft YaHei', sans-serif" font-size="24" font-weight="700">逻辑折叠后</text>
  <rect x="615" y="255" width="52" height="52" rx="6" fill="#ccfbf1" stroke="#0f766e"/>
  <rect x="710" y="255" width="52" height="52" rx="6" fill="#ccfbf1" stroke="#0f766e"/>
  <rect x="805" y="255" width="52" height="52" rx="6" fill="#ccfbf1" stroke="#0f766e"/>
  <path d="M667 281 H710" fill="none" stroke="#0f766e" stroke-width="5" stroke-linecap="round"/>
  <path d="M762 281 H805" fill="none" stroke="#0f766e" stroke-width="5" stroke-linecap="round"/>
  <text x="577" y="365" fill="#111827" font-family="Arial, 'PingFang SC', 'Microsoft YaHei', sans-serif" font-size="22" font-weight="700">目标：缩短关键路径</text>
  <text x="577" y="405" fill="#475569" font-family="Arial, 'PingFang SC', 'Microsoft YaHei', sans-serif" font-size="18">更少绕路，更低负载，更快传播。</text>
  <text x="577" y="485" fill="#475569" font-family="Arial, 'PingFang SC', 'Microsoft YaHei', sans-serif" font-size="18">制程受限时，结构效率会被重新放大。</text>
</svg>
